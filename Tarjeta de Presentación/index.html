<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tarjeta de Perfil</title>
    <link rel="stylesheet" href="style/styles.css" />
  </head>
  <body>

    <!-- ── Tarjeta de perfil ────────────────────────── -->
    <div class="card">

      <!-- Imagen de perfil circular -->
      <div class="card__image-wrapper">
        <img
          class="card__image"
          src="#"
          alt="Foto de perfil de Martín Xinico"
        />
      </div>

      <!-- Badge / etiqueta de rol -->
      <span class="card__badge">Diseñadora UX · Guatemala</span>

      <!-- Nombre destacado como título -->
      <h1 class="card__name">Martín Xinio</h1>

      <!-- Divisor decorativo -->
      <div class="card__divider"></div>

      <!-- Párrafo descriptivo -->
      <p class="card__description">
        Estudiante apasionada que desea ir mejorando, cada día para poder ser un buen diseñador y desarrollador, en el ambito tecnologíco.
      </p>

      <!-- Botón de contacto -->
      <a class="card__btn" href="mailto:ss.mscx@gmail.com">Contactar</a>

    </div>

  </body>
</html>
